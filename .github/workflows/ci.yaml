name: CI

on:
  push:
    branches:
    - '**'
    - '!dependabot/**'
    tags:
    # semver tags
    - 'v[0-9]+(\.[0-9]+\.[0-9]+-?**)?'
  pull_request: {}

jobs:
  test:
    name: Test registry action
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Start registry
      id: registry
      uses: ./
    - name: Install crane
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail
        
        version=$(curl -s https://api.github.com/repos/google/go-containerregistry/releases/latest | jq -r .tag_name)
        os="$(uname)"
        arch="$(arch)"
        if [[ "${arch}" == "aarch64" ]]; then
            arch=arm64
        fi

        url="https://github.com/google/go-containerregistry/releases/download/${version}/go-containerregistry_${os}_${arch}.tar.gz"

        echo "Downloading ${url}"
        curl --fail -L "${url}" \
            | tar -xzf - crane
        mv crane /usr/local/bin
    - name: Use registry
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        crane copy ubuntu ${{ steps.registry.outputs.registry }}/tests/ubuntu
        crane digest ${{ steps.registry.outputs.registry }}/tests/ubuntu
